<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>My Applications | InternshipX</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="dashboard-header">
        <div class="logo">
            <h2>
                <a
                    class="logo-link"
                    href="index.html"
                    aria-label="Go to InternshipX homepage">
                    Internship<span>X</span>
                </a>
            </h2>
        </div>

        <div class="header-right">
            <span id="studentName">Welcome</span>

            <button
                id="profileBtn"
                class="btn-secondary">
                Profile
            </button>

            <button
                id="logoutBtn"
                class="btn-secondary">
                Logout
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="welcome-card">
            <h1>My Applications</h1>
            <p>Review the internships you have applied for and follow each status.</p>
        </section>

        <section class="action-section">
            <button
                class="btn-secondary"
                onclick="window.location.href='student-dashboard.html'">
                Back to Dashboard
            </button>
        </section>

        <section class="internship-section">
            <div class="section-title">
                <h2>Applications</h2>
            </div>

            <div id="applicationList">
                <div class="empty-state">
                    <h3>Loading applications...</h3>
                </div>
            </div>
        </section>
    </main>

    <div id="reportInternshipModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
        <div class="modal-content" style="background: #ffffff; width: 100%; max-width: 500px; padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); position: relative; border: 1px solid #e2e8f0; animation: modalFadeIn 0.3s ease-out; display: flex; flex-direction: column;">
            <button onclick="closeReportModal()" style="position: absolute; top: 15px; right: 15px; border: none; background: transparent; font-size: 1.5rem; cursor: pointer; color: #64748b; font-weight: bold; line-height: 1;">&times;</button>
            <h2 style="margin-top: 0; font-size: 1.3rem; color: #0f172a; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;"><i data-lucide="flag" style="color: #dc2626; width: 22px; height: 22px;"></i> Report Internship</h2>
            <form id="reportForm" onsubmit="submitReportForm(event)">
                <input type="hidden" id="reportInternshipId">
                <input type="hidden" id="reportCompanyId">
                <input type="hidden" id="reportCompanyName">
                <input type="hidden" id="reportInternshipTitle">

                <div style="margin-bottom: 15px; text-align: left;">
                    <label style="display: block; font-weight: 600; color: #334155; font-size: 0.95rem; margin-bottom: 6px;">Report Type</label>
                    <select id="reportType" required style="width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; background: #ffffff; outline: none;">
                        <option value="">Select a reason...</option>
                        <option value="Fake Company">Fake Company</option>
                        <option value="Fake Internship">Fake Internship</option>
                        <option value="Scam">Scam / Fraud</option>
                        <option value="Spam">Spam</option>
                        <option value="Inappropriate Content">Inappropriate Content</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; font-weight: 600; color: #334155; font-size: 0.95rem; margin-bottom: 6px;">Description (required)</label>
                    <textarea id="reportDescription" required placeholder="Please provide specific details about why this internship is suspicious..." style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; min-height: 120px; resize: vertical; outline: none;"></textarea>
                </div>

                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" onclick="closeReportModal()" class="btn-secondary" style="padding: 10px 18px; font-size: 0.9rem;">Cancel</button>
                    <button type="submit" class="btn-primary" style="padding: 10px 18px; font-size: 0.9rem; background: #dc2626; border-color: #dc2626;">Submit Report</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        @keyframes modalFadeIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
