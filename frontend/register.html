<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | InternshipX</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo-section">

            <h1>
                <a
                    class="logo-link"
                    href="index.html"
                    aria-label="Go to InternshipX homepage">
                    Internship<span>X</span>
                </a>
            </h1>

            <p>Launch Your Career</p>

        </div>

        <h2>Create Account</h2>

        <p class="subtitle">
            Join InternshipX and discover internships from top companies.
        </p>

        <form id="registerForm">

            <div class="input-group">

                <label id="nameLabel">Full Name</label>

                <div class="input-box">

                    <i data-lucide="user" id="nameIcon"></i>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required
                    >

                </div>

                <small id="nameError"></small>

            </div>

            <div class="input-group">

                <label>Email Address</label>

                <div class="input-box">

                    <i data-lucide="mail"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>

                <small id="emailError"></small>

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="input-box">

                    <i data-lucide="lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Minimum 8 characters"
                        required
                    >

                </div>

                <small id="passwordError"></small>

            </div>

            <div class="input-group">
                <label>Register As</label>
                <div class="role-selector">
                    <label class="role-card" for="role-student">
                        <input type="radio" id="role-student" name="role-radio" value="student" checked>
                        <i data-lucide="graduation-cap"></i>
                        <span>Student</span>
                    </label>
                    <label class="role-card" for="role-company">
                        <input type="radio" id="role-company" name="role-radio" value="company">
                        <i data-lucide="briefcase"></i>
                        <span>Company</span>
                    </label>
                </div>
                <input type="hidden" id="role" name="role" value="student">
            </div>

            <div class="input-group" id="studentFields">
                <label>College / University</label>
                <div class="input-box">
                    <i data-lucide="book-open"></i>
                    <input
                        type="text"
                        id="college"
                        placeholder="e.g. Assam University"
                    >
                </div>
            </div>

            <div id="companyFields" style="display: none;">
                <div class="input-group">
                    <label>Industry</label>
                    <div class="input-box">
                        <i data-lucide="building"></i>
                        <input
                            type="text"
                            id="industry"
                            placeholder="e.g. Software"
                        >
                    </div>
                </div>

                <div class="input-group">
                    <label>Location</label>
                    <div class="input-box">
                        <i data-lucide="map-pin"></i>
                        <input
                            type="text"
                            id="location"
                            placeholder="e.g. Bangalore"
                        >
                    </div>
                </div>
            </div>

            <button
                id="registerBtn"
                type="submit"
                class="btn-primary"
            >

                Create Account

            </button>

        </form>

        <div id="message"></div>

        <div class="bottom-text">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </div>

    </div>

</div>

<script>
    lucide.createIcons();

    const roleRadioStudent = document.getElementById("role-student");
    const roleRadioCompany = document.getElementById("role-company");
    const roleHiddenInput = document.getElementById("role");

    const nameLabel = document.getElementById("nameLabel");
    const nameInput = document.getElementById("name");
    const nameIcon = document.getElementById("nameIcon");

    const studentFields = document.getElementById("studentFields");
    const companyFields = document.getElementById("companyFields");
    const collegeInput = document.getElementById("college");
    const industryInput = document.getElementById("industry");
    const locationInput = document.getElementById("location");

    function updateRole(roleValue) {
        roleHiddenInput.value = roleValue;
        if (roleValue === "student") {
            studentFields.style.display = "block";
            companyFields.style.display = "none";

            collegeInput.required = true;
            industryInput.required = false;
            locationInput.required = false;

            nameLabel.innerText = "Full Name";
            nameInput.placeholder = "Enter your full name";
            nameIcon.setAttribute("data-lucide", "user");
        } else {
            studentFields.style.display = "none";
            companyFields.style.display = "block";

            collegeInput.required = false;
            industryInput.required = true;
            locationInput.required = true;

            nameLabel.innerText = "Company Name";
            nameInput.placeholder = "Enter company name";
            nameIcon.setAttribute("data-lucide", "building");
        }
        lucide.createIcons();
    }

    roleRadioStudent.addEventListener("change", () => {
        if (roleRadioStudent.checked) {
            updateRole("student");
        }
    });

    roleRadioCompany.addEventListener("change", () => {
        if (roleRadioCompany.checked) {
            updateRole("company");
        }
    });

    updateRole("student");</script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
